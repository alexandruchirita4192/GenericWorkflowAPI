# Pull request validation pipeline.
# Configure this pipeline as a required build validation policy on protected branches
# so pull requests cannot be completed unless this pipeline succeeds.

trigger: none

pr:
  branches:
    include:
    - '*'

pool:
  vmImage: 'windows-2022'

variables:
  solution: 'src/GenericWorkflowAPI.sln'
  buildConfiguration: 'Release'

steps:
- checkout: self
  displayName: 'Checkout repository'

- task: UseDotNet@2
  displayName: 'Install .NET 5 SDK'
  inputs:
    packageType: 'sdk'
    version: '5.0.x'

- task: DotNetCoreCLI@2
  displayName: 'Restore solution packages'
  inputs:
    command: 'restore'
    projects: '$(solution)'

- task: DotNetCoreCLI@2
  displayName: 'Build all projects'
  inputs:
    command: 'build'
    projects: '$(solution)'
    arguments: '--configuration $(buildConfiguration) --no-restore'

- task: DotNetCoreCLI@2
  displayName: 'Run tests'
  inputs:
    command: 'test'
    projects: 'src/GenericWorkflowAPI.UnitTesting/GenericWorkflowAPI.UnitTesting.csproj'
    arguments: '--configuration $(buildConfiguration) --no-build --logger trx'
    publishTestResults: true
