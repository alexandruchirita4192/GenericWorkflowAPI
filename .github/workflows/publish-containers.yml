name: Publish Containers

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Container image tag to publish from the selected branch/ref.
        required: false
        default: latest
        type: string
      publish_latest:
        description: Also publish/update the latest tag when using a custom tag.
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish ${{ matrix.display_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - display_name: GenericWorkflowAPI
            image_name: genericworkflowapi
            dockerfile: src/GenericWorkflowAPI/Dockerfile
          - display_name: GenericWorkflowAPI.IdentityServer4
            image_name: genericworkflowapi-identityserver4
            dockerfile: src/GenericWorkflowAPI.IdentityServer4/Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tags
        id: image
        shell: bash
        env:
          REGISTRY: ghcr.io
          OWNER: ${{ github.repository_owner }}
          IMAGE_NAME: ${{ matrix.image_name }}
          REQUESTED_TAG: ${{ inputs.tag }}
          PUBLISH_LATEST: ${{ inputs.publish_latest }}
          SHA_TAG: sha-${{ github.sha }}
        run: |
          set -euo pipefail

          owner_lc="$(printf '%s' "$OWNER" | tr '[:upper:]' '[:lower:]')"
          image="$REGISTRY/$owner_lc/$IMAGE_NAME"
          tag="${REQUESTED_TAG:-latest}"

          {
            echo "image=$image"
            echo "tag=$tag"
            echo 'tags<<TAGS'
            echo "$image:$tag"
            echo "$image:$SHA_TAG"
            if [[ "$PUBLISH_LATEST" == "true" && "$tag" != "latest" ]]; then
              echo "$image:latest"
            fi
            echo 'TAGS'
          } >> "$GITHUB_OUTPUT"

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}

      - name: Summarize published image
        shell: bash
        run: |
          echo "Published ${{ steps.image.outputs.image }} from ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Tags:" >> "$GITHUB_STEP_SUMMARY"
          while IFS= read -r tag; do
            echo "- \`$tag\`" >> "$GITHUB_STEP_SUMMARY"
          done <<< "${{ steps.image.outputs.tags }}"
